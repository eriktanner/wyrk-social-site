<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wyrk.social</title>
    <style>
      :root { --bg:#0b1220; --fg:#e6edf7; --accent:#34d399; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #17233d, var(--bg));
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      .card {
        width: min(92vw, 680px);
        padding: 28px;
        border: 1px solid #24314f;
        border-radius: 14px;
        background: rgba(8, 12, 22, 0.72);
        backdrop-filter: blur(4px);
      }
      h1 { margin: 0 0 10px; font-size: clamp(28px, 6vw, 46px); }
      p { margin: 8px 0; line-height: 1.5; color: #b7c4da; }
      .ok { color: var(--accent); font-weight: 700; }
      code { background:#111a2c; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>wyrk.social</h1>
      <p class="ok">GitHub Pages is working.</p>
      <p>If you see this at <code>https://wyrk.social</code>, DNS + TLS are correctly configured.</p>
      <p id="ts"></p>
    </main>
    <script>
      document.getElementById("ts").textContent =
        "Build check: " + new Date().toISOString();
    </script>
  </body>
</html>
